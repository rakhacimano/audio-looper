<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mindful Audio Player</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts Quicksand (Soft, rounded font mirip referensi) -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-bg-app: #F8F7F4; /* Krem terang */
            --color-text-dark: #4A3728; /* Cokelat tua */
            --color-text-muted: #9D8F85; /* Cokelat pudar */
            --color-accent-orange: #E68A2E; /* Oranye */
            --color-surface-gray: #EFECE7; /* Abu-abu krem untuk tab/track */
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #E5E2DC; /* Warna background luar (layar PC) */
            color: var(--color-text-dark);
            -webkit-tap-highlight-color: transparent;
        }

        /* Custom Soft Sliders */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        /* Track Styling - Tebal dan membulat lembut */
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: var(--color-surface-gray);
            border-radius: 9999px;
        }

        /* Thumb Styling - Lingkaran solid */
        input[type=range]::-webkit-slider-thumb {
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: var(--color-text-dark);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -5px; /* Pusatkan di tengah track 8px */
            box-shadow: 0 2px 4px rgba(74, 55, 40, 0.2);
            transition: transform 0.2s ease;
        }
        
        input[type=range]:active::-webkit-slider-thumb {
            transform: scale(1.2);
        }

        /* Animasi "Breathing" untuk titik oranye */
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.4); opacity: 1; }
        }

        .breathing-dot.playing {
            animation: breathe 4s ease-in-out infinite;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center sm:p-8">

    <!-- Main App Container (Melengkung ekstrim seperti HP modern) -->
    <div class="w-full max-w-[400px] bg-[#F8F7F4] min-h-screen sm:min-h-[800px] sm:rounded-[45px] sm:shadow-2xl overflow-hidden flex flex-col relative border-[6px] border-white/50">
        
        <div class="p-8 flex-1 flex flex-col">
            
            <!-- Top Nav / Header -->
            <div class="flex justify-between items-center mb-8">
                <button class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm text-[#9D8F85] hover:text-[#4A3728] transition-colors">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <span class="font-bold text-sm tracking-wide">Audio Source</span>
                <div class="w-10 h-10"></div> <!-- Spacer -->
            </div>

            <!-- Pill-shaped Tab Switcher -->
            <div class="flex bg-[#EFECE7] rounded-full p-1.5 mb-8">
                <button id="tabLocal" class="flex-1 py-2.5 text-sm font-bold rounded-full bg-white text-[#4A3728] shadow-sm transition-all">
                    Local
                </button>
                <button id="tabUrl" class="flex-1 py-2.5 text-sm font-bold rounded-full text-[#9D8F85] hover:text-[#4A3728] transition-all">
                    Online
                </button>
            </div>
            
            <!-- Inputs Area -->
            <div class="mb-6 min-h-[90px]">
                <!-- Local File Input -->
                <div id="panelLocal" class="block">
                    <label class="group flex flex-col items-center justify-center w-full h-20 border-2 border-dashed border-[#DED9D1] rounded-3xl hover:border-[#4A3728] hover:bg-white/50 cursor-pointer transition-all">
                        <span class="text-sm font-bold text-[#4A3728]">Choose Audio</span>
                        <span class="text-xs text-[#9D8F85] mt-1 font-medium" id="fileNamePlaceholder">Tap to browse...</span>
                        <input type="file" id="audioFile" accept="audio/mp3, audio/m4a, audio/x-m4a, audio/*" class="hidden" />
                    </label>
                </div>

                <!-- Online URL Input -->
                <div id="panelUrl" class="hidden">
                    <div class="flex flex-col gap-3">
                        <input type="url" id="audioUrl" placeholder="Paste URL here..." 
                               class="bg-white px-5 py-3.5 text-sm font-medium text-[#4A3728] placeholder-[#9D8F85] focus:outline-none w-full rounded-full shadow-sm border border-[#EFECE7]">
                        <button id="loadUrlBtn" class="bg-[#4A3728] text-white px-5 py-3.5 text-sm font-bold rounded-full hover:bg-[#36271c] transition-colors shadow-md">
                            Load URL
                        </button>
                    </div>
                </div>
                
                <div id="errorBox" class="mt-4 p-3 bg-[#fceceb] text-[#c95a53] rounded-2xl text-xs hidden font-bold text-center"></div>
            </div>

            <!-- Main Player Deck -->
            <div id="playerDeck" class="opacity-40 pointer-events-none transition-opacity duration-500 flex-1 flex flex-col items-center justify-center mt-4">
                
                <!-- Zen Graphic (The Orange Dot) -->
                <div class="w-full flex justify-center items-center mb-10 h-24">
                    <div id="zenDot" class="w-12 h-12 bg-[#E68A2E] rounded-full breathing-dot shadow-lg shadow-[#E68A2E]/30"></div>
                </div>

                <!-- Hidden HTML5 Audio -->
                <audio id="audioPlayer" preload="metadata"></audio>

                <!-- Metadata Info (Center Aligned) -->
                <div class="mb-10 text-center w-full">
                    <h2 id="trackTitle" class="text-3xl font-bold text-[#4A3728] truncate px-2 mb-2">
                        Get Settled.
                    </h2>
                    <p id="trackArtist" class="text-[15px] font-semibold text-[#9D8F85]">
                        Ready?
                    </p>
                </div>

                <!-- Progress Bar Section -->
                <div class="w-full mb-10">
                    <div class="flex items-center justify-between text-xs font-bold text-[#9D8F85] mb-3 px-1">
                        <span id="currentTimeDisplay">00:00</span>
                        <span id="durationDisplay">25:00</span>
                    </div>
                    <input type="range" id="progressBar" value="0" min="0" max="100" step="0.1">
                </div>

                <!-- Player Controllers -->
                <div class="w-full flex items-center justify-center gap-8 mb-6">
                    
                    <!-- Loop Button -->
                    <button id="loopBtn" class="text-[#9D8F85] hover:text-[#4A3728] p-2 focus:outline-none transition-colors relative">
                        <i class="fa-solid fa-rotate text-xl"></i>
                        <span id="loopIndicator" class="absolute top-0 right-0 w-2 h-2 bg-[#E68A2E] rounded-full hidden"></span>
                    </button>

                    <!-- Skip Back -->
                    <button id="btnBackward" class="text-[#9D8F85] hover:text-[#4A3728] focus:outline-none p-2 transition-colors">
                        <i class="fa-solid fa-arrow-rotate-left text-xl"></i>
                    </button>

                    <!-- Play/Pause Button (Besar & Coklat Tua) -->
                    <button id="playPauseBtn" class="w-20 h-20 bg-[#4A3728] text-white rounded-full shadow-xl shadow-[#4A3728]/20 flex items-center justify-center focus:outline-none transform active:scale-95 transition-all">
                        <i id="playIcon" class="fa-solid fa-play text-2xl ml-1"></i>
                    </button>

                    <!-- Skip Forward -->
                    <button id="btnForward" class="text-[#9D8F85] hover:text-[#4A3728] focus:outline-none p-2 transition-colors">
                        <i class="fa-solid fa-arrow-rotate-right text-xl"></i>
                    </button>
                    
                    <!-- Mute/Volume Toggle -->
                    <button id="muteBtn" class="text-[#9D8F85] hover:text-[#4A3728] focus:outline-none p-2 transition-colors">
                        <i id="volumeIcon" class="fa-solid fa-volume-high text-xl"></i>
                    </button>
                </div>
                
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const audioPlayer = document.getElementById('audioPlayer');
            const fileInput = document.getElementById('audioFile');
            const urlInput = document.getElementById('audioUrl');
            const loadUrlBtn = document.getElementById('loadUrlBtn');
            const playerDeck = document.getElementById('playerDeck');
            
            const trackTitle = document.getElementById('trackTitle');
            const trackArtist = document.getElementById('trackArtist');
            const errorBox = document.getElementById('errorBox');
            const fileNamePlaceholder = document.getElementById('fileNamePlaceholder');
            const zenDot = document.getElementById('zenDot');
            
            const playPauseBtn = document.getElementById('playPauseBtn');
            const playIcon = document.getElementById('playIcon');
            const progressBar = document.getElementById('progressBar');
            const currentTimeDisplay = document.getElementById('currentTimeDisplay');
            const durationDisplay = document.getElementById('durationDisplay');
            
            const btnBackward = document.getElementById('btnBackward');
            const btnForward = document.getElementById('btnForward');
            const loopBtn = document.getElementById('loopBtn');
            const loopIndicator = document.getElementById('loopIndicator');
            const muteBtn = document.getElementById('muteBtn');
            const volumeIcon = document.getElementById('volumeIcon');

            // Tabs toggle controls
            const tabLocal = document.getElementById('tabLocal');
            const tabUrl = document.getElementById('tabUrl');
            const panelLocal = document.getElementById('panelLocal');
            const panelUrl = document.getElementById('panelUrl');

            let currentObjectUrl = null;

            function formatTime(seconds) {
                if (isNaN(seconds) || !isFinite(seconds)) return "00:00";
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }

            // Tab Switching Logic (Soft styles)
            tabLocal.addEventListener('click', () => {
                tabLocal.className = 'flex-1 py-2.5 text-sm font-bold rounded-full bg-white text-[#4A3728] shadow-sm transition-all';
                tabUrl.className = 'flex-1 py-2.5 text-sm font-bold rounded-full text-[#9D8F85] hover:text-[#4A3728] transition-all';
                panelLocal.classList.remove('hidden');
                panelUrl.classList.add('hidden');
                errorBox.classList.add('hidden');
            });

            tabUrl.addEventListener('click', () => {
                tabUrl.className = 'flex-1 py-2.5 text-sm font-bold rounded-full bg-white text-[#4A3728] shadow-sm transition-all';
                tabLocal.className = 'flex-1 py-2.5 text-sm font-bold rounded-full text-[#9D8F85] hover:text-[#4A3728] transition-all';
                panelUrl.classList.remove('hidden');
                panelLocal.classList.add('hidden');
                errorBox.classList.add('hidden');
            });

            // Initialize Player state
            function initAudioSource(title, subtitle) {
                playerDeck.classList.remove('opacity-40', 'pointer-events-none');
                trackTitle.textContent = title;
                trackArtist.textContent = subtitle;
                errorBox.classList.add('hidden');
                
                playIcon.className = 'fa-solid fa-play text-2xl ml-1';
                progressBar.value = 0;
                currentTimeDisplay.textContent = "00:00";
                zenDot.classList.remove('playing');
            }

            function showError(msg) {
                errorBox.textContent = msg;
                errorBox.classList.remove('hidden');
            }

            // Local File Handler
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.type.startsWith('audio/') || file.name.endsWith('.m4a') || file.name.endsWith('.mp3')) {
                        if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
                        
                        currentObjectUrl = URL.createObjectURL(file);
                        audioPlayer.src = currentObjectUrl;
                        fileNamePlaceholder.textContent = "File Selected";
                        fileNamePlaceholder.classList.replace('text-[#9D8F85]', 'text-[#E68A2E]');
                        
                        initAudioSource(file.name.replace(/\.[^/.]+$/, ""), 'Local Audio Session');
                    } else {
                        showError("Invalid format. Please select an audio file.");
                        fileInput.value = '';
                    }
                }
            });

            // URL Input Handler
            function processUrlInput() {
                const url = urlInput.value.trim();
                if (url) {
                    try {
                        new URL(url);
                        audioPlayer.src = url;
                        initAudioSource('Online Stream', 'Mindful Listening');
                    } catch (err) {
                        showError("Invalid URL provided.");
                    }
                }
            }

            loadUrlBtn.addEventListener('click', processUrlInput);
            urlInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') processUrlInput();
            });

            // Play/Pause Logic
            function togglePlay() {
                if (!audioPlayer.src || audioPlayer.src === window.location.href) return;

                if (audioPlayer.paused) {
                    audioPlayer.play()
                        .then(() => {
                            playIcon.className = 'fa-solid fa-pause text-2xl';
                            zenDot.classList.add('playing'); // Start breathing animation
                        })
                        .catch(e => {
                            showError("Failed to play audio. Check CORS or file format.");
                        });
                } else {
                    audioPlayer.pause();
                    playIcon.className = 'fa-solid fa-play text-2xl ml-1';
                    zenDot.classList.remove('playing'); // Stop breathing animation
                }
            }

            playPauseBtn.addEventListener('click', togglePlay);

            // Skip Controls (15 seconds)
            btnBackward.addEventListener('click', () => {
                if (audioPlayer.duration) audioPlayer.currentTime = Math.max(0, audioPlayer.currentTime - 15);
            });

            btnForward.addEventListener('click', () => {
                if (audioPlayer.duration) audioPlayer.currentTime = Math.min(audioPlayer.duration, audioPlayer.currentTime + 15);
            });

            // Progress Bar Logic
            audioPlayer.addEventListener('timeupdate', () => {
                const current = audioPlayer.currentTime;
                const total = audioPlayer.duration;
                currentTimeDisplay.textContent = formatTime(current);
                if (total) progressBar.value = (current / total) * 100;
            });

            audioPlayer.addEventListener('loadedmetadata', () => {
                durationDisplay.textContent = formatTime(audioPlayer.duration);
            });

            progressBar.addEventListener('input', () => {
                if (audioPlayer.duration) {
                    audioPlayer.currentTime = (progressBar.value / 100) * audioPlayer.duration;
                }
            });

            // Loop Toggle
            loopBtn.addEventListener('click', () => {
                audioPlayer.loop = !audioPlayer.loop;
                if (audioPlayer.loop) {
                    loopBtn.classList.replace('text-[#9D8F85]', 'text-[#4A3728]');
                    loopIndicator.classList.remove('hidden');
                } else {
                    loopBtn.classList.replace('text-[#4A3728]', 'text-[#9D8F85]');
                    loopIndicator.classList.add('hidden');
                }
            });

            // Mute Toggle (Removed range slider to match minimalist UI, just tap to mute/unmute)
            muteBtn.addEventListener('click', () => {
                audioPlayer.muted = !audioPlayer.muted;
                if (audioPlayer.muted) {
                    volumeIcon.className = 'fa-solid fa-volume-xmark text-xl text-[#9D8F85]';
                } else {
                    volumeIcon.className = 'fa-solid fa-volume-high text-xl text-[#4A3728]';
                }
            });

            // End & Error Events
            audioPlayer.addEventListener('ended', () => {
                if (!audioPlayer.loop) {
                    playIcon.className = 'fa-solid fa-play text-2xl ml-1';
                    zenDot.classList.remove('playing');
                    progressBar.value = 0;
                    currentTimeDisplay.textContent = "00:00";
                }
            });

            audioPlayer.addEventListener('error', () => {
                showError("Failed to load media file.");
                playIcon.className = 'fa-solid fa-play text-2xl ml-1';
                zenDot.classList.remove('playing');
            });
        });
    </script>
</body>
</html>
